name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Run test suite
        # Tests run without Kivy or device hardware — numpy is the only runtime dep.
        # The KIVY_NO_ENV_CONFIG variable prevents any Kivy import from failing
        # if a test accidentally imports a Kivy-adjacent module.
        env:
          KIVY_NO_ENV_CONFIG: "1"
        run: python -m unittest discover -s tests -v
